name: Deploy to Github Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

# Allow one concurrent deployment
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0
        with:
          runtime: node@v24.17.0

      - name: Install dependencies
        run: pnpm ci

      - name: Type checking
        run: pnpm check

      - name: Check code style
        run: |
          pnpm fmt
          git --no-pager diff --exit-code

      - name: CI tests
        run: pnpm test

      - name: Build
        run: pnpm vite build

      - run: node scripts/postbuild.js

      - name: Upload build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          name: build
          path: build

  upload:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
      - name: Write ssh key
        run: |
          mkdir --parents ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ssh-key
          chmod 600 ~/.ssh/ssh-key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
      - name: Sync
        run: |
          # Trust host public key
          echo "${{ secrets.SSH_HOST }} ${{ secrets.SSH_HOST_KEY }}" >> ~/.ssh/known_hosts
          ssh-keygen -Hf ~/.ssh/known_hosts

          rsync --verbose --human-readable --archive \
            --checksum --delete \
            --rsh "ssh -i ~/.ssh/ssh-key" \
            . "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/lusc.ch/"
      - run: rm ~/.ssh/ssh-key
        if: always()
